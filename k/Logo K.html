<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>Logo K — Chevron</title>
<style>
  :root {
    --bg: #0d1a14;
    --ink: #e6efe8;
    --muted: #8aa094;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; min-height: 100vh; }
  .page {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }
  header, footer {
    padding: 24px 32px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }
  header b, footer b { color: var(--ink); font-weight: 500; }
  main {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 1px;
    background: #1a2a22;
    border-top: 1px solid #1a2a22;
    border-bottom: 1px solid #1a2a22;
  }
  .hero, .side {
    background: var(--bg);
    display: grid;
    place-items: center;
    padding: 48px;
    position: relative;
  }
  .hero {
    aspect-ratio: 1 / 1;
  }
  .hero svg { width: min(70%, 560px); height: auto; }

  .side {
    grid-template-rows: repeat(3, 1fr);
    grid-template-columns: 1fr;
    gap: 1px;
    padding: 0;
    background: #1a2a22;
  }
  .side .cell {
    background: var(--bg);
    display: grid;
    place-items: center;
    padding: 24px;
    position: relative;
  }
  .side .cell.alt { background: #f6f5f1; }
  .side .cell.brand { background: var(--accent, oklch(0.72 0.18 145)); }
  .cell .tag {
    position: absolute;
    top: 14px;
    left: 14px;
    font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
  .cell.alt .tag { color: #6b7770; }
  .cell.brand .tag { color: rgba(13,26,20,0.7); }

  .lockup {
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .lockup .word {
    font-weight: 500;
    font-size: 28px;
    letter-spacing: -0.02em;
  }

  /* responsive */
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
    .hero { aspect-ratio: 1 / 1; }
    .side { grid-template-rows: repeat(3, 200px); }
  }

  #tweaks-root { position: fixed; right: 16px; bottom: 16px; z-index: 50; }
</style>
</head>
<body>
  <div class="page">
    <header>
      <span><b>K</b> · Chevron mark</span>
      <span>dark mode · v1</span>
    </header>

    <main>
      <section class="hero" id="hero">
        <svg id="kmark" viewBox="0 0 200 200" aria-label="Logo K">
          <rect class="stem" x="40" y="32" width="20" height="136" />
          <g class="chev" fill="none" stroke-linecap="square">
            <polyline points="70,100 130,40 170,40" />
            <polyline points="70,100 130,160 170,160" />
          </g>
        </svg>
      </section>

      <aside class="side">
        <div class="cell">
          <span class="tag">lockup</span>
          <div class="lockup">
            <svg viewBox="0 0 200 200" width="64" height="64" aria-hidden="true">
              <rect class="stem" x="40" y="32" width="20" height="136" />
              <g class="chev" fill="none" stroke-linecap="square">
                <polyline points="70,100 130,40 170,40" />
                <polyline points="70,100 130,160 170,160" />
              </g>
            </svg>
            <span class="word" id="word">kompass</span>
          </div>
        </div>
        <div class="cell alt">
          <span class="tag">light bg</span>
          <svg viewBox="0 0 200 200" width="120" height="120" aria-hidden="true">
            <rect class="stem-alt" x="40" y="32" width="20" height="136" />
            <g class="chev-alt" fill="none" stroke-linecap="square">
              <polyline points="70,100 130,40 170,40" />
              <polyline points="70,100 130,160 170,160" />
            </g>
          </svg>
        </div>
        <div class="cell brand">
          <span class="tag">brand fill</span>
          <svg viewBox="0 0 200 200" width="120" height="120" aria-hidden="true">
            <rect class="stem-ko" x="40" y="32" width="20" height="136" />
            <g class="chev-ko" fill="none" stroke-linecap="square">
              <polyline points="70,100 130,40 170,40" />
              <polyline points="70,100 130,160 170,160" />
            </g>
          </svg>
        </div>
      </aside>
    </main>

    <footer>
      <span>oklch · single-hue green</span>
      <span>200×200 viewBox</span>
    </footer>
  </div>

  <div id="tweaks-root"></div>

<script>
  // ===== Tweakable defaults (editable on disk via __edit_mode_set_keys) =====
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "oklch(0.42 0.12 155)",
    "stroke": 22,
    "wordmark": "gent",
    "showWord": true,
    "bg": "#0d1a14"
  }/*EDITMODE-END*/;

  function applyTweaks(t) {
    document.documentElement.style.setProperty('--accent', t.accent);
    document.documentElement.style.setProperty('--bg', t.bg);
    document.body.style.background = t.bg;

    // Stroke widths
    document.querySelectorAll('.chev polyline, .chev-alt polyline, .chev-ko polyline').forEach(el => {
      el.setAttribute('stroke-width', t.stroke);
    });
    // Stem widths (proportional ~ stroke - 2)
    const stemW = Math.max(8, t.stroke - 2);
    document.querySelectorAll('rect.stem, rect.stem-alt, rect.stem-ko').forEach(el => {
      const cx = 50;
      el.setAttribute('width', stemW);
      el.setAttribute('x', cx - stemW / 2);
    });

    // Colors
    document.querySelectorAll('.chev').forEach(el => el.setAttribute('stroke', t.accent));
    document.querySelectorAll('rect.stem').forEach(el => el.setAttribute('fill', t.accent));
    // light bg variant uses dark bg color
    document.querySelectorAll('.chev-alt').forEach(el => el.setAttribute('stroke', t.bg));
    document.querySelectorAll('rect.stem-alt').forEach(el => el.setAttribute('fill', t.bg));
    // brand-fill cell uses near-black
    document.querySelectorAll('.chev-ko').forEach(el => el.setAttribute('stroke', '#0d1a14'));
    document.querySelectorAll('rect.stem-ko').forEach(el => el.setAttribute('fill', '#0d1a14'));

    // Wordmark
    const w = document.getElementById('word');
    if (w) {
      w.textContent = t.wordmark;
      w.parentElement.style.display = t.showWord ? 'flex' : 'none';
    }
  }
  // initial apply (no-tweak baseline)
  applyTweaks(TWEAK_DEFAULTS);
  window.__applyTweaks = applyTweaks;
  window.__TWEAK_DEFAULTS = TWEAK_DEFAULTS;
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">
  const { useEffect } = React;

  function Panel() {
    const [t, setTweak] = useTweaks(window.__TWEAK_DEFAULTS);
    useEffect(() => { window.__applyTweaks(t); }, [t]);

    return (
      <TweaksPanel title="Tweaks">
        <TweakSection title="Couleur">
          <TweakColor
            label="Accent"
            value={t.accent}
            onChange={v => setTweak('accent', v)}
            options={[
              'oklch(0.72 0.18 145)',
              'oklch(0.58 0.16 150)',
              'oklch(0.42 0.12 155)',
              'oklch(0.85 0.20 130)'
            ]}
          />
          <TweakColor
            label="Fond"
            value={t.bg}
            onChange={v => setTweak('bg', v)}
            options={['#0d1a14', '#10221a', '#0a0f0c', '#f6f5f1']}
          />
        </TweakSection>
        <TweakSection title="Forme">
          <TweakSlider label="Trait" value={t.stroke} min={10} max={36} step={1} onChange={v => setTweak('stroke', v)} />
        </TweakSection>
        <TweakSection title="Lockup">
          <TweakToggle label="Afficher le wordmark" value={t.showWord} onChange={v => setTweak('showWord', v)} />
          <TweakText label="Wordmark" value={t.wordmark} onChange={v => setTweak('wordmark', v)} />
        </TweakSection>
      </TweaksPanel>
    );
  }

  ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<Panel />);
</script>
</body>
</html>
